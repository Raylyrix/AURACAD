name: Build AuraCAD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: auracad:latest
        load: true
    
    - name: Run container test
      run: |
        docker run --rm auracad:latest 2>&1 || echo "Container test complete"
    
    - name: Test Docker run
      run: |
        docker run --rm auracad:latest echo "AuraCAD Docker working!"
    
    - name: Upload Docker image as artifact
      uses: actions/upload-artifact@v4
      with:
        name: AuraCAD-Docker
        path: /var/lib/docker/...