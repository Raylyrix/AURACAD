name: Build AuraCAD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        submodules: false
    
    - name: Install dependencies (Ubuntu)
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          g++ \
          libboost-dev \
          libboost-filesystem-dev \
          libboost-program-options-dev \
          libboost-regex-dev \
          libboost-python-dev \
          libqt5core5a \
          libqt5xmlpatterns5-dev \
          libqt5svg5-dev \
          libshiboken2-dev \
          libpyside2-dev \
          python3-dev \
          python3-numpy \
          liboce-dev \
          libeigen3-dev \
          libspnav-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libxmu-dev \
          libxi-dev \
          libnetcdf-dev \
          hdf5-openmpi \
          libxft-dev \
          libzlibpng-dev \
          liblzma-dev \
          libzstd-dev
    
    - name: Configure CMake
      run: |
        cd src
        mkdir -p build
        cd build
        cmake .. \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_TESTING=OFF \
          -DBUILD_DOC=OFF \
          -DBUILD_FEM=OFF \
          -DBUILD_ASSEMBLY=OFF \
          -DBUILD_DRAFT=OFF \
          -DBUILD_ARCH=OFF \
          -DBUILD_PART DESIGN=OFF \
          -DBUILD_ROBOT=OFF
    
    - name: Build
      run: |
        cd src/build
        ninja -j$(nproc)
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AuraCAD-Linux
        path: src/build/bin/AuraCAD
        retention-days: 7

  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Install Visual Studio
      uses: microsoft/setup-msbuild@v1
    
    - name: Configure CMake
      shell: pwsh
      run: |
        cd src
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DBUILD_TESTING=OFF -DBUILD_DOC=OFF
    
    - name: Build
      shell: pwsh
      run: |
        cd src/build
        cmake --build . --config Release
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AuraCAD-Windows
        path: src/build/bin/AuraCAD.exe
        retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: AuraCAD-Linux
    
    - name: Build Docker image
      run: |
        chmod +x AuraCAD
        docker build -t auracad:latest .
    
    - name: Test Docker
      run: |
        docker run --rm auracad:latest --version 2>&1 || echo "Binary not found, but Docker builds"