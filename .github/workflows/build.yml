name: Build AuraCAD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: raylyrix/auracad:latest
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Test Docker run
      run: |
        docker run --rm raylyrix/auracad:latest
    
    - name: Inspect image
      run: |
        docker inspect raylyrix/auracad:latest
    
    - name: Save image to tar
      run: |
        docker save -o auracad-image.tar raylyrix/auracad:latest
    
    - name: Upload image as artifact
      uses: actions/upload-artifact@v4
      with:
        name: AuraCAD-Docker-Image
        path: auracad-image.tar
        retention-days: 7